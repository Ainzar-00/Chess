<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    html{
     height: 100%;
     width: 100%;
    }
    body{
     height: 100%;
     width: 100%;
     margin: 0;
     display: flex;
     justify-content: center;
     align-items: center;
    }
    #board{
     position: relative;
     width: 500px;
     height: 500px;
     background-color: aqua;
     display: flex;
     flex-wrap: wrap;
     align-content: start;
    }
    #board>div{
      position: relative;
      width: 62.5px;
      height: 62.5px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 0;
    }
    #board>div>span{
        position: absolute;
        font-family: sans-serif;
    }
    
     #board img{
      width:  40px;
      height: 40px;
      z-index: 99;
      pointer-events: none;
     }

    div span{
        position: relative;
        font-family: sans-serif;
    }
    #value_advantage_w{
        font-size: 15px;
        color: gray;
        margin-left: 6px;
        display: inline;
    }
    #value_advantage_b{
        font-size: 15px;
        margin-left: 6px;
        display: inline;
        top: 0;
    }
    #black_situation{
        position: relative;
        top: 0;
        display: flex;
        height: 15px;
        width: fit-content;
        align-content: start;
        justify-content: start;
        background-color: aquamarine;
        padding: 5px;
    }
    #black_situation img , #white_situation img{
        width: 15px;
        height: 15px;
    }
    #white_situation{
        position: relative;
        display: flex;
        bottom: 0;
        height: 15px;
        width: fit-content;
        background-color: aquamarine;
        padding: 5px;
        align-content: start;
        justify-content: start;
    }
    #white_lost_ps,#black_lost_ps{
       /* min-width: 15px;
       min-height: 16px; */
       /* width: 15px !important;
       height: 16px !important; */
       display: flex;
       gap: 3px;
    }
    #white_lost_ps>div,#black_lost_ps>div{
         width: 16px;
         height: 16px;
    }
    
    #reversebtn{
        position: absolute;
        right: 0;
    }
    .indicator{
        width: 20px;
        height: 20px;
        border-radius: 50px;
        background-color: rgb(141, 137, 137);
        /* opacity: 0.4; */
    }

    
    #whiteTimer{
        position: absolute;
        display: flex;
        align-items: center;
        width: 150px;
        height: 47px;
        background-color: rgb(255, 255, 255);
        bottom: 0;
        border: 1px solid black;
        right: 0;
        margin-right: 50px;
        border-radius: 6px;
    }

    #blackTimer{
        position: absolute;
        display: flex;
        align-items: center;
        width: 150px;
        height: 47px;
        background-color: rgb(0, 0, 0);
        top: 0;
        right: 0;
        margin-right: 50px;
        border-radius: 6px;
    }
    .watch{
        width: 20px;
        height: 20px;
        border-radius: 60px;
        margin-left: 5px;
    }
      @keyframes Rotation {
        0% {transform: rotate(0deg);}
        25% {transform: rotate(90deg);}
        50% {transform: rotate(180deg);}
        75% {transform: rotate(270deg);}
        100%{transform: rotate(360deg);}
     }
    
     #whiteTimer .watch{
        border: 3px black solid;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: Rotation 1.75s infinite;
     }

    
     #blackTimer .watch{
        
        display: flex;
        border: 3px white solid;
        align-items: center;
        justify-content: center;

        animation: Rotation 1.75s  infinite;
     }

    

     #whiteTimer .watch div{
        width: 8px;
        height: 2px;
        background-color: black;
        border-radius: 5px;
        margin-right: 4px;
     }

     #blackTimer .watch div{
            width: 8px;
            height: 2px;
            background-color: white;
            border-radius: 5px;
            margin-right: 4px;
            
     }

</style>
<body>
    
    <div style=" position: relative; width: fit-content; height: fit-content; padding: 50px;">

        <div id="blackTimer"> <div class="watch"><div></div></div> <span></span> </div>

        <div id="whiteTimer"> <div class="watch"><div></div></div> <span></span></div>

    <div id="black_situation">
        <div id="white_lost_ps"></div>
        <span id="value_advantage_w"></span>
    </div>
    
    <div id="board"></div>

    <div id="white_situation">
        <div id="black_lost_ps"></div>
        <span id="value_advantage_b"></span>
    </div>
    
    <button id="reversebtn">click</button>
    </div>
<script type="module"  src="chess.js"></script>
<script src="Timer.js"></script>
</body>


</html>
